<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Login</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 1px solid #ccc; display: inline-block; padding: 20px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Google orqali kirish</h1>
        <p>Google orqali davom etmoqchimisiz?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Davom etish</button>
        </form>
    </div>
</body>
</html>
